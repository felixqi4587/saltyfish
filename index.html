<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f8f8f0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>咸鱼小队 · saltyfish</title>
<link rel="stylesheet" href="app.css?v=14">
<style>
  /* home-only flourishes */
  .fishfloat{animation:bob 3.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-9px) rotate(1.5deg)}}
  .blink{animation:blink 4.2s ease-in-out infinite}
  @keyframes blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.15)}}
  .herofish{text-align:center;padding:6px 0 2px}
  .squad{font:900 27px/1 var(--font);color:var(--brown);letter-spacing:1px;margin:6px 0 2px;text-align:center}
  .squad .salt{color:var(--mint-deep)}
  .quote{text-align:center;color:var(--brown2);font-weight:700;font-size:13.5px;margin-top:8px;min-height:20px}
  .entry{display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit}
  .entry .em{width:58px;height:58px;border-radius:18px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:30px}
  .entry .em.def{background:linear-gradient(180deg,#eafaf7,var(--mint-bg));border:2px solid #bfeee7}
  .entry .em.gift{background:linear-gradient(180deg,#fff6e0,#fdeccb);border:2px solid #f3dca0}
  .entry h2{margin:0 0 2px}
  .entry .go{margin-left:auto;color:var(--mint);font-size:22px;font-weight:900}
</style>
</head>
<body>
<div class="wrap">
  <main>
  <div class="homebar"><div id="langtoggle" class="langtoggle"></div></div>
  <div class="card hero" style="text-align:center">
    <div class="herofish">
      <svg class="fishfloat" viewBox="0 0 320 230" width="232" style="max-width:78%;overflow:visible">
        <defs>
          <linearGradient id="body" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe0cb"/><stop offset="1" stop-color="#f7b79a"/></linearGradient>
          <radialGradient id="pud" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#3dd4c6" stop-opacity=".5"/><stop offset="1" stop-color="#19c8b9" stop-opacity="0"/></radialGradient>
        </defs>
        <!-- shadow / puddle -->
        <ellipse cx="160" cy="196" rx="118" ry="20" fill="url(#pud)"/>
        <ellipse cx="160" cy="196" rx="86" ry="12" fill="#19c8b9" opacity=".28"/>
        <!-- leaf -->
        <g transform="rotate(14 268 150)">
          <path d="M256 150 q26 -14 40 6 q-26 16 -40 -6 Z" fill="#85cc45" stroke="#4f7d20" stroke-width="3" stroke-linejoin="round"/>
          <line x1="262" y1="153" x2="290" y2="153" stroke="#4f7d20" stroke-width="2.4"/>
        </g>
        <!-- salted fish lying back, relaxed -->
        <g>
          <!-- tail -->
          <path d="M62 132 L24 104 L33 138 L24 176 Z" fill="url(#body)" stroke="#794f27" stroke-width="5" stroke-linejoin="round"/>
          <!-- body -->
          <path d="M78 140 C100 90 236 88 276 134 C232 178 116 182 78 140 Z" fill="url(#body)" stroke="#794f27" stroke-width="5.5" stroke-linejoin="round"/>
          <!-- top fin -->
          <path d="M150 92 q14 -26 36 -10" fill="#f7b79a" stroke="#794f27" stroke-width="5" stroke-linejoin="round"/>
          <!-- side fin -->
          <path d="M152 150 q22 24 46 8" fill="#ffe0cb" stroke="#794f27" stroke-width="4.5" stroke-linecap="round"/>
          <!-- salt grains -->
          <g fill="#fff" stroke="#e3d4ad" stroke-width="1.2"><circle cx="150" cy="116" r="3.4"/><circle cx="186" cy="108" r="3"/><circle cx="124" cy="122" r="2.6"/><circle cx="214" cy="120" r="2.8"/></g>
          <!-- happy closed eyes ^ ^ -->
          <g class="blink" style="transform-origin:215px 132px">
            <path d="M196 132 q9 -11 18 0" fill="none" stroke="#794f27" stroke-width="5.5" stroke-linecap="round"/>
            <path d="M228 132 q9 -11 18 0" fill="none" stroke="#794f27" stroke-width="5.5" stroke-linecap="round"/>
          </g>
          <!-- blush -->
          <circle cx="204" cy="148" r="8" fill="#f48fb1" opacity=".55"/>
          <circle cx="244" cy="148" r="8" fill="#f48fb1" opacity=".55"/>
          <!-- content smile -->
          <path d="M212 154 q12 11 24 0" fill="none" stroke="#794f27" stroke-width="4.2" stroke-linecap="round"/>
        </g>
        <!-- sparkles -->
        <path d="M266 104 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 Z" fill="#f5c31c"/>
        <path d="M96 96 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2 Z" fill="#f5c31c"/>
      </svg>
    </div>
    <div class="squad">咸<span class="salt">鱼</span>小队 <span style="font-size:16px;color:var(--brown3)">saltyfish</span></div>
    <div class="quote" id="quote">躺平不是摆烂，是战略性休息 🐟</div>
  </div>

  <a class="card entry" href="defense.html">
    <div class="em def">🛡️</div>
    <div><h2 data-i18n="home_def_title">防守支援</h2><p class="hint" style="margin:0" data-i18n="home_def_desc">填你的行军时间 → 看几点发补兵、护住王城</p></div>
    <div class="go">›</div>
  </a>

  <a class="card entry" href="gift.html">
    <div class="em gift">🎁</div>
    <div><h2 data-i18n="home_gift_title">礼包码</h2><p class="hint" style="margin:0" data-i18n="home_gift_desc">全队自动兑换 · 官方 Discord 直连（需密码）</p></div>
    <div class="go">›</div>
  </a>

  <p class="foot" data-i18n="home_foot">咸鱼小队自用工具 · 非官方、与 Century Games 无关 · 摸鱼有度，集结有我 🐟</p>
  </main>
</div>

<script src="app.js?v=14"></script>
<script>
(function(){
  var i=0, q=document.getElementById("quote");
  function show(){ q.textContent=t("q"+i); }
  window.onLangChange=show;
  initI18n(); show();
  setInterval(function(){ i=(i+1)%6; q.style.opacity=0;
    setTimeout(function(){ show(); q.style.transition="opacity .4s"; q.style.opacity=1; },300); }, 3600);
})();
</script>
</body>
</html>
