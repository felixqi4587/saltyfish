<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14110B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>1406rocks · KvK 时机模拟器</title>
<style>
  :root{
    --bg:#14110B; --bg2:#1C190F; --surface:#241F14; --surface2:#2E2818; --line:rgba(255,240,210,.10);
    --tx:#FCF6E8; --t2:rgba(250,240,220,.62); --t3:rgba(250,240,220,.34);
    --ac:#E9A82E; --ac2:#FFC558; --ac-tint:rgba(233,168,46,.16); --ac-on:#1A1206;
    --ok:#36D17A; --ok-tint:rgba(54,209,122,.16);
    --bad:#FF5247; --bad-tint:rgba(255,82,71,.16);
    --enemy:#FF5247;
    --font:-apple-system,BlinkMacSystemFont,system-ui,"PingFang SC","Helvetica Neue",sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:
      radial-gradient(120% 60% at 50% -10%, #2A2412 0%, #14110B 55%) fixed,
      var(--bg);
    color:var(--tx);font-family:var(--font);font-size:16px;line-height:1.4;letter-spacing:-.2px;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .wrap{max-width:480px;margin:0 auto;padding:14px 14px 36px}
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

  .top{display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .top .sig{color:var(--ac);display:inline-flex}
  .top h1{font-size:19px;font-weight:800;margin:0;letter-spacing:.5px}
  .top .sub{font-size:11px;color:var(--t3);margin-top:1px;letter-spacing:.3px}

  /* mode selector */
  .modes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
  .modes button{border:.5px solid var(--line);background:var(--surface);color:var(--t2);
    border-radius:14px;padding:12px 4px;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;gap:6px;font:600 13px/1 var(--font);transition:.16s}
  .modes button svg{width:22px;height:22px;stroke:var(--t3);transition:.16s}
  .modes button.on{border-color:var(--ac);background:var(--ac-tint);color:var(--ac2)}
  .modes button.on svg{stroke:var(--ac)}

  /* stage */
  .stage{position:relative;background:linear-gradient(180deg,var(--bg2),#100E08);
    border:.5px solid var(--line);border-radius:18px;padding:6px;overflow:hidden;margin-bottom:12px}
  .stage svg{display:block;width:100%;height:auto}
  .nodeLab{font:600 10px/1 var(--font);letter-spacing:.3px}
  .playbtn{position:absolute;right:12px;bottom:12px;border:0;border-radius:100px;
    background:var(--ac);color:var(--ac-on);font:700 13px/1 var(--font);padding:10px 16px;
    cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .playbtn svg{width:13px;height:13px;fill:var(--ac-on)}
  .phaselab{position:absolute;left:12px;bottom:13px;font:700 12px/1 var(--mono);color:var(--ac2);
    letter-spacing:.5px;opacity:0;transition:opacity .2s}
  .phaselab.show{opacity:1}

  /* verdict */
  .verdict{border-radius:16px;padding:15px 16px;margin-bottom:14px;text-align:center;transition:.2s}
  .verdict.ok{background:var(--ok-tint)} .verdict.warn{background:var(--ac-tint)} .verdict.bad{background:var(--bad-tint)}
  .verdict .hl{font:800 13px/1 var(--font);letter-spacing:.4px}
  .verdict.ok .hl{color:var(--ok)} .verdict.warn .hl{color:var(--ac2)} .verdict.bad .hl{color:var(--bad)}
  .verdict .big{font:800 38px/1 var(--mono);margin:9px 0 5px;letter-spacing:-1px}
  .verdict .sub{font-size:13px;color:var(--t2)}
  .verdict .sub b{color:var(--tx)}

  /* inputs */
  .fld{margin-bottom:13px}
  .fld .lab{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:600;margin-bottom:3px}
  .fld .lab .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .fld .tip{font-size:11.5px;color:var(--t3);margin:0 0 8px 15px;line-height:1.4}
  .chips{display:flex;gap:7px}
  .chips button{flex:1;border:.5px solid var(--line);background:var(--surface);color:var(--t2);
    font:600 14px/1 var(--font);padding:11px 4px;border-radius:11px;cursor:pointer}
  .chips button.on{background:var(--ac-tint);border-color:var(--ac);color:var(--ac2)}
  .mmss{display:flex;align-items:center;gap:6px;background:var(--surface);border:.5px solid var(--line);
    border-radius:11px;padding:6px 8px}
  .mmss .step{flex:1;display:flex;align-items:center;justify-content:center;gap:4px}
  .mmss button{width:34px;height:34px;border:0;border-radius:9px;background:var(--surface2);color:var(--ac);
    font:700 20px/1 var(--font);cursor:pointer;flex:0 0 auto}
  .mmss input{width:44px;background:transparent;border:0;color:var(--tx);text-align:center;
    font:700 20px/1 var(--mono);-moz-appearance:textfield}
  .mmss input::-webkit-outer-spin-button,.mmss input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .mmss .u{font-size:11px;color:var(--t3)}
  .mmss .colon{color:var(--t3);font:700 18px/1 var(--mono)}

  .foot{font-size:11px;color:var(--t3);text-align:center;margin-top:18px;line-height:1.6}
  .hide{display:none!important}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <span class="sig" aria-hidden="true"><svg viewBox="0 0 120 120" width="30" height="30" fill="none">
      <path d="M60 14 C60 14 84 22 98 22 C98 22 100 60 96 76 C91 95 74 104 60 110 C46 104 29 95 24 76 C20 60 22 22 22 22 C36 22 60 14 60 14 Z" stroke="currentColor" stroke-width="6" stroke-linejoin="round"/>
      <path d="M60 84 C50 84 43 78 43 69 C43 60 50 56 60 56 C70 56 77 60 77 69 C77 78 70 84 60 84 Z" fill="currentColor"/>
      <ellipse cx="44" cy="50" rx="5" ry="6.5" fill="currentColor"/><ellipse cx="55" cy="44" rx="5" ry="6.5" fill="currentColor"/>
      <ellipse cx="66" cy="44" rx="5" ry="6.5" fill="currentColor"/><ellipse cx="77" cy="50" rx="5" ry="6.5" fill="currentColor"/>
    </svg></span>
    <div><h1>1406 ROCKS</h1><div class="sub">KvK 集结 / 支援 时机模拟器</div></div>
  </div>

  <div class="modes" id="modes">
    <button data-mode="attack" class="on">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h13"/><path d="M12 5l8 7-8 7"/></svg>进攻发车</button>
    <button data-mode="join">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 11l-3 3-2-2"/></svg>加入别人</button>
    <button data-mode="defend">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg>支援防守</button>
  </div>

  <div class="stage">
    <svg viewBox="0 0 360 196" id="svg">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- subtle field -->
      <rect x="0" y="0" width="360" height="196" fill="none"/>
      <g stroke="rgba(255,240,210,.05)" stroke-width="1">
        <line x1="0" y1="49" x2="360" y2="49"/><line x1="0" y1="98" x2="360" y2="98"/><line x1="0" y1="147" x2="360" y2="147"/>
        <line x1="90" y1="0" x2="90" y2="196"/><line x1="180" y1="0" x2="180" y2="196"/><line x1="270" y1="0" x2="270" y2="196"/>
      </g>
      <!-- paths (faint) + progress -->
      <line id="path2bg" stroke="rgba(255,82,71,.25)" stroke-width="2" stroke-dasharray="3 5" class="hide"/>
      <line id="path1bg" stroke="rgba(233,168,46,.28)" stroke-width="2" stroke-dasharray="3 5"/>
      <line id="path2" stroke="#FF5247" stroke-width="3" stroke-linecap="round" class="hide"/>
      <line id="path1" stroke="#E9A82E" stroke-width="3" stroke-linecap="round"/>
      <!-- countdown ring (prep/gate/impact) -->
      <circle id="ring" fill="none" stroke="#E9A82E" stroke-width="3.5" stroke-linecap="round"/>
      <!-- impact -->
      <circle id="impact" fill="none" stroke="#FFC558" stroke-width="3" opacity="0"/>
      <!-- tokens -->
      <circle id="army2" r="7" fill="#FF5247" filter="url(#glow)" class="hide"/>
      <circle id="army1" r="7" fill="#E9A82E" filter="url(#glow)"/>
      <!-- nodes drawn last (on top) -->
      <g id="nodes"></g>
    </svg>
    <div class="phaselab" id="phaselab"></div>
    <button class="playbtn" id="play"><svg viewBox="0 0 24 24"><path d="M7 4v16l13-8z"/></svg>播放</button>
  </div>

  <div class="verdict ok" id="verdict">
    <div class="hl" id="v_hl">—</div>
    <div class="big tnum" id="v_big">—</div>
    <div class="sub" id="v_sub">—</div>
  </div>

  <div id="inputs"></div>

  <p class="foot" id="foot">行军时间在游戏里点目标/队友就能看到——会随距离和加速变化，请自己量。<br>1406 玩家自制 · 非官方 · 临场以指挥为准 🐻</p>
</div>

<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};
  var NS="http://www.w3.org/2000/svg";
  var C={ac:"#E9A82E",ac2:"#FFC558",en:"#FF5247",ok:"#36D17A",surf2:"#2E2818",t2:"rgba(250,240,220,.62)"};

  /* ---------- state ---------- */
  var mode="attack";
  var prep=5; // minutes
  // per-mode seconds
  var v={ aMarch:180, jGate:240, jMarch:150, dImpact:300, dMarch:120 };

  /* ---------- node positions per mode ---------- */
  // my = origin(amber army), tgt = where army1 goes, enemy = red army origin (defend only)
  var L={
    attack:{ my:[58,150],  tgt:[300,60], enemy:null,
             myLab:"我方城", tgtLab:"目标", ring:"my" },   // ring = prep fill at my
    join:{   my:[58,150],  tgt:[300,60], enemy:null,
             myLab:"我方城", tgtLab:"车头(集结点)", ring:"tgt" }, // ring = gate at tgt
    defend:{ my:[316,150], tgt:[180,52], enemy:[44,150],
             myLab:"我方城", tgtLab:"队友城", enemyLab:"敌军", ring:"tgt" } // ring = impact at tgt
  };

  function dist(a,b){return Math.hypot(b[0]-a[0],b[1]-a[1]);}
  var R=15; // ring radius

  /* ---------- build nodes ---------- */
  function nodeEl(pos,label,kind){
    var g=document.createElementNS(NS,"g");
    var col = kind==="enemy"? C.en : (kind==="tgt"? C.ac2 : C.ac);
    var rect=document.createElementNS(NS,"rect");
    rect.setAttribute("x",pos[0]-13);rect.setAttribute("y",pos[1]-13);rect.setAttribute("width",26);rect.setAttribute("height",26);
    rect.setAttribute("rx",7);rect.setAttribute("fill",C.surf2);rect.setAttribute("stroke",col);rect.setAttribute("stroke-width","1.5");
    g.appendChild(rect);
    var ic=document.createElementNS(NS,"path");
    ic.setAttribute("transform","translate("+(pos[0]-7)+","+(pos[1]-7)+") scale(0.58)");
    ic.setAttribute("fill","none");ic.setAttribute("stroke",col);ic.setAttribute("stroke-width","3");
    ic.setAttribute("stroke-linecap","round");ic.setAttribute("stroke-linejoin","round");
    var d = kind==="enemy" ? "M3 21l8-8M11 13l4-10 6 6-10 4M14 6l4 4"
          : kind==="tgt" ? "M12 2v4M12 18v4M2 12h4M18 12h4M12 12m-5 0a5 5 0 1 0 10 0a5 5 0 1 0 -10 0"
          : "M3 21V10l9-7 9 7v11h-6v-7h-6v7z"; // home
    ic.setAttribute("d",d); g.appendChild(ic);
    var t=document.createElementNS(NS,"text");
    t.setAttribute("x",pos[0]); t.setAttribute("y",pos[1]+ (pos[1]<60? -19 : 28));
    t.setAttribute("text-anchor","middle"); t.setAttribute("fill",C.t2); t.setAttribute("class","nodeLab");
    t.textContent=label; g.appendChild(t);
    return g;
  }

  function setLine(id,a,b){var e=$(id);e.setAttribute("x1",a[0]);e.setAttribute("y1",a[1]);e.setAttribute("x2",b[0]);e.setAttribute("y2",b[1]);}

  function layout(){
    var c=L[mode];
    // nodes
    var ng=$("nodes"); ng.innerHTML="";
    ng.appendChild(nodeEl(c.my,c.myLab,"my"));
    ng.appendChild(nodeEl(c.tgt,c.tgtLab,"tgt"));
    if(c.enemy) ng.appendChild(nodeEl(c.enemy,c.enemyLab,"enemy"));
    // path1 (mine)
    setLine("path1bg",c.my,c.tgt); setLine("path1",c.my,c.my);
    // path2 (enemy)
    var p2=$("path2"),p2b=$("path2bg"),a2=$("army2");
    if(c.enemy){ p2.classList.remove("hide");p2b.classList.remove("hide");a2.classList.remove("hide");
      setLine("path2bg",c.enemy,c.tgt); setLine("path2",c.enemy,c.enemy);
      a2.setAttribute("cx",c.enemy[0]);a2.setAttribute("cy",c.enemy[1]);
    } else { p2.classList.add("hide");p2b.classList.add("hide");a2.classList.add("hide"); }
    // army1 at origin
    $("army1").setAttribute("cx",c.my[0]); $("army1").setAttribute("cy",c.my[1]);
    // ring
    var rp = c.ring==="my"? c.my : c.tgt;
    var ring=$("ring"); ring.setAttribute("cx",rp[0]);ring.setAttribute("cy",rp[1]);ring.setAttribute("r",R);
    var circ=2*Math.PI*R; ring.setAttribute("stroke-dasharray",circ);
    ring.setAttribute("transform","rotate(-90 "+rp[0]+" "+rp[1]+")");
    ring.setAttribute("stroke", mode==="defend"?C.en:C.ac);
    ring.setAttribute("stroke-dashoffset", mode==="attack"? circ : 0); // attack: empty then fills; others: full then empties
    // impact pos
    var im=$("impact"); im.setAttribute("cx",c.tgt[0]);im.setAttribute("cy",c.tgt[1]);im.setAttribute("opacity",0);
    ring._circ=circ;
  }

  function posOn(a,b,p){return [a[0]+(b[0]-a[0])*p, a[1]+(b[1]-a[1])*p];}
  function setArmy(id,a,b,p){var e=$(id);var pt=posOn(a,b,p);e.setAttribute("cx",pt[0]);e.setAttribute("cy",pt[1]);
    var ln=$(id==="army1"?"path1":"path2"); ln.setAttribute("x2",pt[0]);ln.setAttribute("y2",pt[1]);}

  /* ---------- formatters ---------- */
  function fmt(s){s=Math.round(s);var sign=s<0?"-":"";s=Math.abs(s);var m=Math.floor(s/60);var ss=s%60;
    return sign+(m>0?m+"分":"")+(ss<10&&m>0?"0":"")+ss+"秒";}
  function mmss(s){s=Math.max(0,Math.round(s));return Math.floor(s/60)+":"+(s%60<10?"0":"")+(s%60);}

  /* ---------- inputs ---------- */
  function chips(label,tip,dotCol,val,opts,onPick){
    var h='<div class="fld"><div class="lab"><span class="dot" style="background:'+dotCol+'"></span>'+label+'</div>'+
      (tip?'<div class="tip">'+tip+'</div>':'')+'<div class="chips">'+
      opts.map(function(o){return '<button data-v="'+o+'"'+(o==val?' class="on"':'')+'>'+o+' 分</button>';}).join("")+'</div></div>';
    return h;
  }
  function stepper(label,tip,dotCol,key){
    var s=v[key],m=Math.floor(s/60),ss=s%60;
    return '<div class="fld"><div class="lab"><span class="dot" style="background:'+dotCol+'"></span>'+label+'</div>'+
      (tip?'<div class="tip">'+tip+'</div>':'')+
      '<div class="mmss" data-key="'+key+'">'+
        '<div class="step"><button data-d="-60">−</button><input data-u="m" type="number" inputmode="numeric" min="0" value="'+m+'"><span class="u">分</span><button data-d="60">+</button></div>'+
        '<span class="colon">:</span>'+
        '<div class="step"><button data-d="-10">−</button><input data-u="s" type="number" inputmode="numeric" min="0" max="59" value="'+(ss<10?"0":"")+ss+'"><span class="u">秒</span><button data-d="10">+</button></div>'+
      '</div></div>';
  }

  function renderInputs(){
    var box=$("inputs"),h="";
    if(mode==="attack"){
      h+=chips("集结准备时间","车头开集结后，留给大家上车的时间（游戏里选）。","var(--ac)",prep,[5,10,30,60]);
      h+=stepper("我到目标的行军时间","就是地图上你的大军走到目标要多久。","var(--ac)","aMarch");
    }else if(mode==="join"){
      h+=stepper("车头还有多久出发","车头喊的「还有 X 出发」——窗口一关就发车。","var(--ac2)","jGate");
      h+=stepper("我到车头城的行军时间","你的兵走到车头的城要多久（要在出发前到）。","var(--ac)","jMarch");
    }else{
      h+=stepper("敌人还有多久命中队友","敌方集结的命中倒计时（车头喊或你估）。","var(--enemy)","dImpact");
      h+=stepper("我到队友城的行军时间","你的援军走到被打的城要多久。","var(--ac)","dMarch");
    }
    box.innerHTML=h;
  }

  /* ---------- compute verdict + static geometry ---------- */
  function recompute(){
    var ver=$("verdict"),hl=$("v_hl"),big=$("v_big"),sub=$("v_sub");
    var c=L[mode], ring=$("ring");
    if(mode==="attack"){
      var total=prep*60+v.aMarch;
      ver.className="verdict warn";
      hl.textContent="从现在开集结";
      big.textContent=mmss(total)+" 后命中";
      sub.innerHTML="准备 <b>"+prep+" 分</b> ＋ 行军 <b>"+fmt(v.aMarch)+"</b>";
      // static: army at origin, ring empty (prep not started in idle)
      setArmy("army1",c.my,c.tgt,0);
      ring.setAttribute("stroke-dashoffset",ring._circ);
    }else if(mode==="join"){
      var slack=v.jGate-v.jMarch;
      setArmy("army1",c.my,c.tgt, clamp(v.jMarch/Math.max(v.jGate,v.jMarch,1),0,1)*0); // idle at origin
      $("army1").setAttribute("cx",c.my[0]);$("army1").setAttribute("cy",c.my[1]);
      ring.setAttribute("stroke-dashoffset",0); // gate full (open) idle
      if(slack>=20){ ver.className="verdict ok"; hl.textContent="赶得上 ✓"; big.textContent="还可等 "+mmss(slack);
        sub.innerHTML="最晚<b>出发前 "+fmt(v.jMarch)+"</b>发兵就能上车"; }
      else if(slack>=0){ ver.className="verdict warn"; hl.textContent="快关窗了"; big.textContent="立刻发兵";
        sub.innerHTML="只剩 <b>"+fmt(slack)+"</b> 余量，马上发"; }
      else { ver.className="verdict bad"; hl.textContent="来不及 ✕"; big.textContent="差 "+fmt(-slack);
        sub.innerHTML="现在立刻发也赶不上这趟车"; }
    }else{
      var slackD=v.dImpact-v.dMarch;
      $("army1").setAttribute("cx",c.my[0]);$("army1").setAttribute("cy",c.my[1]);
      $("army2").setAttribute("cx",c.enemy[0]);$("army2").setAttribute("cy",c.enemy[1]);
      ring.setAttribute("stroke-dashoffset",0);
      if(slackD>=20){ ver.className="verdict ok"; hl.textContent="守得住 ✓"; big.textContent="早到 "+mmss(slackD);
        sub.innerHTML="最晚<b>敌人命中前 "+fmt(v.dMarch)+"</b>发援军"; }
      else if(slackD>=0){ ver.className="verdict warn"; hl.textContent="勉强赶上"; big.textContent="立刻支援";
        sub.innerHTML="只剩 <b>"+fmt(slackD)+"</b> 余量，马上发"; }
      else { ver.className="verdict bad"; hl.textContent="守不住 ✕"; big.textContent="晚 "+fmt(-slackD);
        sub.innerHTML="援军会比敌人晚到，赶不及"; }
    }
  }
  function clamp(x,a,b){return Math.max(a,Math.min(b,x));}

  /* ---------- play full animation ---------- */
  var raf=null;
  function play(){
    if(raf) cancelAnimationFrame(raf);
    var c=L[mode], ring=$("ring"), circ=ring._circ, im=$("impact");
    var phase=$("phaselab"); phase.classList.add("show");
    im.setAttribute("opacity",0);
    var t0=performance.now();

    if(mode==="attack"){
      var prepS=prep*60, marchS=v.aMarch, totS=prepS+marchS;
      var scale=5200/Math.max(totS,1); var prepP=prepS*scale, marchP=marchS*scale;
      var run=function(now){var e=now-t0;
        if(e<prepP){ var p=e/prepP; ring.setAttribute("stroke-dashoffset",circ*(1-p)); // fill
          setArmy("army1",c.my,c.tgt,0); phase.textContent="集结准备中 "+fmt(prepS*(1-p))+" →出发"; }
        else if(e<prepP+marchP){ ring.setAttribute("stroke-dashoffset",0); var p=(e-prepP)/marchP;
          setArmy("army1",c.my,c.tgt,p); phase.textContent="行军中 "+fmt(marchS*(1-p))+" →命中"; }
        else { setArmy("army1",c.my,c.tgt,1); flash(im); phase.textContent="命中！"; done(); return; }
        raf=requestAnimationFrame(run);};
      raf=requestAnimationFrame(run);

    }else if(mode==="join"){
      var gate=v.jGate, march=v.jMarch, span=Math.max(gate,march,1);
      var scale=5000/span, gateP=gate*scale, marchP2=march*scale;
      var run=function(now){var e=now-t0; var end=Math.max(gateP,marchP2);
        var gp=clamp(e/gateP,0,1); ring.setAttribute("stroke-dashoffset",circ*gp); // gate closing (offset->circ = empty)
        var mp=clamp(e/marchP2,0,1); setArmy("army1",c.my,c.tgt,mp);
        phase.textContent="出发还剩 "+fmt(gate*(1-gp))+" ｜我还要 "+fmt(march*(1-mp));
        if(e>=end){ var win=march<=gate; if(win){flash(im);} phase.textContent= win?"上车成功！":"窗口已关，没赶上"; done(); return; }
        raf=requestAnimationFrame(run);};
      raf=requestAnimationFrame(run);

    }else{
      var imp=v.dImpact, marchD=v.dMarch, span2=Math.max(imp,marchD,1);
      var scale=5000/span2, impP=imp*scale, myP=marchD*scale;
      var run=function(now){var e=now-t0; var end=Math.max(impP,myP);
        var ip=clamp(e/impP,0,1); ring.setAttribute("stroke-dashoffset",circ*ip);
        setArmy("army2",c.enemy,c.tgt,ip);
        var mp=clamp(e/myP,0,1); setArmy("army1",c.my,c.tgt,mp);
        phase.textContent="敌人命中还剩 "+fmt(imp*(1-ip))+" ｜援军还要 "+fmt(marchD*(1-mp));
        if(e>=end){ var hold=marchD<=imp; flash(im, hold?C.ok:C.en);
          phase.textContent= hold?"援军先到，守住！":"敌人先到，城破"; done(); return; }
        raf=requestAnimationFrame(run);};
      raf=requestAnimationFrame(run);
    }
    function done(){ setTimeout(function(){phase.classList.remove("show"); recompute();},1800); }
  }
  function flash(im,col){im.setAttribute("stroke",col||C.ac2);
    var r=4,o=1;im.setAttribute("opacity",1);
    (function grow(){r+=2.2;o-=0.04;im.setAttribute("r",r);im.setAttribute("opacity",Math.max(0,o));
      if(o>0)requestAnimationFrame(grow);})();}

  /* ---------- wire ---------- */
  $("modes").addEventListener("click",function(e){var b=e.target.closest("[data-mode]");if(!b)return;
    mode=b.dataset.mode; this.querySelectorAll("button").forEach(function(x){x.classList.toggle("on",x===b);});
    layout(); renderInputs(); recompute();});
  $("inputs").addEventListener("click",function(e){
    var chip=e.target.closest(".chips [data-v]");
    if(chip){ prep=parseInt(chip.dataset.v,10); chip.parentNode.querySelectorAll("button").forEach(function(x){x.classList.toggle("on",x===chip);}); recompute(); return;}
    var sb=e.target.closest(".mmss [data-d]");
    if(sb){ var box=sb.closest(".mmss"),key=box.dataset.key,d=parseInt(sb.dataset.d,10);
      v[key]=Math.max(0,v[key]+d); syncStepper(box,key); recompute(); }
  });
  $("inputs").addEventListener("input",function(e){var inp=e.target.closest(".mmss input");if(!inp)return;
    var box=inp.closest(".mmss"),key=box.dataset.key;
    var m=parseInt(box.querySelector('[data-u="m"]').value,10)||0, s=parseInt(box.querySelector('[data-u="s"]').value,10)||0;
    v[key]=Math.max(0,m*60+s); recompute();});
  function syncStepper(box,key){var s=v[key];box.querySelector('[data-u="m"]').value=Math.floor(s/60);
    var ss=s%60;box.querySelector('[data-u="s"]').value=(ss<10?"0":"")+ss;}
  $("play").addEventListener("click",play);

  /* ---------- go ---------- */
  layout(); renderInputs(); recompute();
})();
</script>
</body>
</html>
